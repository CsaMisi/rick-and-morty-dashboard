<div class="d-flex vh-100 overflow-hidden">
  <main class="flex-grow-1 d-flex flex-column overflow-hidden h-100">
    <div class="flex-grow-1 overflow-auto p-4 p-md-5">
      <div class="container-fluid max-w-7xl mx-auto">
        <div class="page-wrapper">
          <h1 class="mb-4 text-center">Character Dashboard</h1>
          <div class="container-fluid dashboard-container">
            <div class="input-group search-group">
              <span class="input-group-text search-icon " id="search-icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
              </span>
              <input
                type="text"
                class="form-control"
                id="search-input"
                placeholder="Search characters..."
                [value]="SearchTerm()"
                (input)="OnSearch($event)"
                aria-describedby="search-icon"
              />
            </div>

            <div class="card characters-card theme-card" style="min-height: 400px">
              @if (Loading()) {
                <div
                  class="loader-wrapper d-flex align-items-center justify-content-center h-100"
                  style="min-height: 400px"
                >
                  <div class="spinner-border loader-spinner" role="status">
                    <span class="visually-hidden">Loading...</span>
                  </div>
                </div>
              } @else {
                <div class="table-responsive" id="characters-table">
                  <table class="table table-hover characters-table">
                    <thead>
                      <tr>
                        <th scope="col">Avatar</th>
                        <th scope="col">Name</th>
                        <th scope="col">Species</th>
                        <th scope="col">Status</th>
                      </tr>
                    </thead>
                    <tbody>
                      @for (character of characters(); track character.id) {
                        <tr>
                          <td>
                            <img
                              [ngSrc]="character.image"
                              width="48"
                              height="48"
                              [alt]="character.name"
                              class="rounded-circle character-avatar"
                            />
                          </td>
                          <td>
                            <a [routerLink]="['/character', character.id]" class="character-link">
                              {{ character.name }}
                            </a>
                          </td>
                          <td class="character-link">
                            {{ character.species }}
                          </td>
                          <td>
                            <div class="status-wrapper">
                              <span
                                  class="badge rounded-pill status-badge"
                                  [class.alive]="character.status === 'Alive'"
                                  [class.dead]="character.status === 'Dead'"
                                  [class.unknown]="character.status === 'unknown'"
                              >
                                &nbsp;
                              </span>
                                <span>{{ character.status }}</span>
                            </div>
                          </td>
                        </tr>
                      }
                    </tbody>
                  </table>
                </div>
              }
            </div>

          <div class="d-flex align-items-center justify-content-center mt-4 position-relative">
            <div class="form-check form-switch d-flex align-items-center gap-2 position-absolute start-0">
                <input
                class="form-check-input m-0"
                style="cursor: pointer; width: 2.5rem; height: 1.25rem;"
                  type="checkbox"
                role="switch"
                  id="darkModeSwitch"
                [checked]="ThemeService.IsDarkMode()"
                (change)="ThemeService.ToggleDarkMode()"
                />
              <label class="form-check-label" for="darkModeSwitch" style="cursor: pointer; user-select: none;">Dark Mode</label>
              </div>

              @if (totalPages() > 1) {
              <nav aria-label="Table pagination" class="mx-auto">
                <ul class="pagination mb-0 justify-content-center gap-2">
                    <li class="page-item" [class.disabled]="Page() === 1 || Loading()">
                      <button
                        class="page-link theme-action-btn rounded"
                        (click)="PreviousPage()"
                        [disabled]="Loading()"
                      >
                        Previous
                      </button>
                    </li>

                    @for (p of VisiblePages(); track p) {
                      <li
                        class="page-item"
                        [class.active]="Page() === p"
                        [class.disabled]="Loading()"
                      >
                        <button
                          class="page-link theme-action-btn border-secondary rounded"
                          [class.active-page]="Page() === p"
                          (click)="Page.set(p)"
                          [disabled]="Loading()"
                        >
                          {{ p }}
                        </button>
                      </li>
                    }

                    <li class="page-item" [class.disabled]="Page() === totalPages() || Loading()">
                      <button
                        class="page-link theme-action-btn rounded"
                        (click)="NextPage()"
                        [disabled]="Loading()"
                      >
                        Next
                      </button>
                    </li>
                  </ul>
                </nav>
              }
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
