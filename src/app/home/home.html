<div class="d-flex vh-100 overflow-hidden">
  <aside
    class="bg-card border-end border-secondary d-none d-md-flex flex-column transition-all"
    [ngStyle]="{ width: Sidebar.isOpen() ? '260px' : '80px', transition: 'width 0.3s ease' }"
  >
    <div
      class="p-3 d-flex align-items-center"
      [ngClass]="Sidebar.isOpen() ? 'justify-content-between' : 'justify-content-center'"
    >
      @if (Sidebar.isOpen()) {
        <h5 class="m-0 text-primary fw-bold text-truncate">Rick & Morty</h5>
      }

      <button
        class="btn btn-sm btn-outline-secondary border-0 text-dark"
        (click)="Sidebar.ToggleSidebar()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>

    <hr class="border-secondary m-0" />

    <ul class="nav nav-pills flex-column p-3 gap-2">
      <li class="nav-item">
        <a
          routerLink="/"
          class="nav-link text-light d-flex align-items-center gap-3"
          routerLinkActive="bg-primary text-dark fw-medium"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="7" height="9"></rect>
            <rect x="14" y="3" width="7" height="5"></rect>
            <rect x="14" y="12" width="7" height="9"></rect>
            <rect x="3" y="16" width="7" height="5"></rect>
          </svg>
          @if (Sidebar.isOpen()) {
            <span>Dashboard</span>
          }
        </a>
      </li>
    </ul>

    <hr class="border-secondary m-0" />

    <div class="p-3 flex-grow-1 overflow-auto">
      @if (Sidebar.isOpen()) {
        <h6 class="text-muted text-uppercase fw-bold mb-3" style="font-size: 0.75rem;">Recently Viewed</h6>
      }
      <ul class="nav nav-pills flex-column gap-2">
        <li class="nav-item">
            <!--TODO: Placeholders for now, will implement with profiles page-->
          <a routerLink="/character/1" class="nav-link text-dark d-flex align-items-center gap-3 p-2">
            <img src="https://rickandmortyapi.com/api/character/avatar/1.jpeg" alt="Rick Sanchez" class="rounded-circle border border-secondary" width="32" height="32" style="object-fit: cover;">
            @if (Sidebar.isOpen()) {
              <span class="text-truncate">Rick Sanchez</span>
            }
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/character/2" class="nav-link text-dark d-flex align-items-center gap-3 p-2">
            <img src="https://rickandmortyapi.com/api/character/avatar/2.jpeg" alt="Morty Smith" class="rounded-circle border border-secondary" width="32" height="32" style="object-fit: cover;">
            @if (Sidebar.isOpen()) {
              <span class="text-truncate">Morty Smith</span>
            }
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/character/3" class="nav-link text-dark d-flex align-items-center gap-3 p-2">
            <img src="https://rickandmortyapi.com/api/character/avatar/3.jpeg" alt="Summer Smith" class="rounded-circle border border-secondary" width="32" height="32" style="object-fit: cover;">
            @if (Sidebar.isOpen()) {
              <span class="text-truncate">Summer Smith</span>
            }
          </a>
        </li>
      </ul>
    </div>
  </aside>

  <main class="flex-grow-1 d-flex flex-column overflow-hidden h-100">
   
    <nav class="navbar navbar-dark bg-card border-bottom border-secondary d-md-none px-3 shadow-sm">
      <button class="navbar-toggler border-0" type="button" (click)="Sidebar.ToggleMobileSidebar()">
        <!-- TODO: sidebar toggle  -->
        <span class="navbar-toggler-icon"></span>
      </button>
    </nav>

    <div class="flex-grow-1 overflow-auto p-4 p-md-5">
      <div class="container-fluid max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </div>
  </main>
</div>
